<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Edit Author - Demo</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <h2>Edit Author</h2>
        <a href="index.html" class="btn-back">Back</a>
        <form id="authorForm">
            <label>Name</label>
            <input type="text" id="name" required>
            <label>Email</label>
            <input type="email" id="email">
            <label>Address</label>
            <input type="text" id="address">
            <button class="btn-edit" type="submit">Update</button>
        </form>
    </div>

    <script src="../js/data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const authorId = urlParams.get('id');
        
        if (!authorId) {
            window.location.href = 'index.html';
        }
        
        const author = AppData.getAuthor(authorId);
        if (!author) {
            alert('Author not found!');
            window.location.href = 'index.html';
        }
        
        document.getElementById('name').value = author.name || '';
        document.getElementById('email').value = author.email || '';
        document.getElementById('address').value = author.address || '';
        
        document.getElementById('authorForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const updatedAuthor = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                address: document.getElementById('address').value
            };
            
            AppData.updateAuthor(authorId, updatedAuthor);
            alert('Author updated successfully!');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
