<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Authors - Demo</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <h2>Authors</h2>
        <div class="actions">
            <a href="../" class="btn-back">Back</a>
            <a href="create.html" class="btn-add">Add Author</a>
            <button onclick="AppData.resetData()" class="btn-warn" style="background: #f59e0b;">Reset Demo Data</button>
        </div>

        <div id="authors-table-container">
            <!-- Table will be loaded here via JavaScript -->
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script>
        function loadAuthors() {
            const authors = AppData.getAuthors();
            const container = document.getElementById('authors-table-container');
            
            if (authors.length === 0) {
                container.innerHTML = '<p class="note">No authors found. <a href="create.html">Add your first author</a></p>';
                return;
            }
            
            let html = '<table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Address</th><th>Action</th></tr></thead><tbody>';
            
            authors.forEach(author => {
                html += `<tr>
                    <td>${author.id}</td>
                    <td>${escapeHtml(author.name)}</td>
                    <td>${escapeHtml(author.email || '')}</td>
                    <td>${escapeHtml(author.address || '')}</td>
                    <td>
                        <a href="edit.html?id=${author.id}" class="btn-edit">Edit</a>
                        <a href="#" onclick="deleteAuthor(${author.id})" class="btn-delete">Delete</a>
                    </td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function deleteAuthor(id) {
            if (confirm('Are you sure you want to delete this author?')) {
                AppData.deleteAuthor(id);
                loadAuthors();
            }
        }
        
        loadAuthors();
    </script>
</body>
</html>
