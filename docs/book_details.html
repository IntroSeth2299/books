<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Assign Author to Book</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="container">
    <a class="btn-back" href="index.html">← Back</a>
    <h2>Assign Author to Book</h2>

    <form class="form-inline">
      <label>Select Book</label>
      <select><option>Select Book</option><option>Tom Tev</option><option>Pennywise</option></select>
      <label>Select Author</label>
      <select><option>Select Author</option><option>Piseth</option><option>Bhikkhu Som</option></select>
      <button class="btn-assign" style="width:100%;">Assign</button>
    </form>

    <h3 style="margin-top:28px;">Current Assignments</h3>
    <table>
      <thead><tr><th>BOOK</th><th>AUTHOR</th><th>ACTION</th></tr></thead>
      <tbody>
        <tr><td>sdf</td><td>Piseth</td><td><a class="btn-delete" href="#">Remove</a></td></tr>
        <tr><td>Tom Tev</td><td>Bhikkhu Som</td><td><a class="btn-delete" href="#">Remove</a></td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
