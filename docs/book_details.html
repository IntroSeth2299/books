<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Book Assignments — Static</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <a class="btn-back" href="index.html">← Back</a>
    <h2>Book Assignments</h2>

    <p class="note">Static view of book-author assignments. Client-side dynamic rendering possible with <code>data.json</code>.</p>

    <table id="assignments-table">
      <thead><tr><th>ID</th><th>Book</th><th>Author</th></tr></thead>
      <tbody>
        <tr><td>1</td><td>Example Book</td><td>Jane Doe</td></tr>
        <tr><td>2</td><td>Another Title</td><td>John Smith</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    (async function(){
      try {
        const r = await fetch('data.json');
        if (!r.ok) return;
        const data = await r.json();
        if (!data.book_details) return;
        const tbody = document.querySelector('#assignments-table tbody');
        tbody.innerHTML = '';
        data.book_details.forEach(bd=>{
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${bd.id}</td><td>${escapeHtml(bd.book_title||bd.book || '')}</td><td>${escapeHtml(bd.author_name||bd.author || '')}</td>`;
          tbody.appendChild(tr);
        });
      } catch(e){}
      function escapeHtml(s){ return String(s).replace(/[&"'<>]/g, c=>({ '&':'&amp;','"':'&quot;','\'':'&#39;','<':'&lt;','>':'&gt;' }[c])); }
    })();
  </script>
</body>
</html>
