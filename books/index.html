<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Books - Demo</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <h2>Books</h2>
        <div class="actions">
            <a href="../" class="btn-back">Back</a>
            <a href="create.html" class="btn-add">Add Book</a>
            <button onclick="AppData.resetData()" class="btn-warn" style="background: #f59e0b;">Reset Demo Data</button>
        </div>

        <div id="books-table-container">
            <!-- Table will be loaded here via JavaScript -->
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script>
        function loadBooks() {
            const books = AppData.getBooks();
            const container = document.getElementById('books-table-container');
            
            if (books.length === 0) {
                container.innerHTML = '<p class="note">No books found. <a href="create.html">Add your first book</a></p>';
                return;
            }
            
            let html = '<table><thead><tr><th>ID</th><th>Title</th><th>Pages</th><th>Year</th><th>Category</th><th>Authors</th><th>Action</th></tr></thead><tbody>';
            
            books.forEach(book => {
                const authors = AppData.getBookAuthors(book.id);
                const authorNames = authors.map(a => a.name).join(', ') || 'None';
                
                html += `<tr>
                    <td>${book.id}</td>
                    <td>${escapeHtml(book.title)}</td>
                    <td>${book.page}</td>
                    <td>${book.publish_year}</td>
                    <td>${escapeHtml(book.category || '')}</td>
                    <td>${escapeHtml(authorNames)}</td>
                    <td>
                        <a href="edit.html?id=${book.id}" class="btn-edit">Edit</a>
                        <a href="#" onclick="deleteBook(${book.id})" class="btn-delete">Delete</a>
                    </td>
                </tr>`;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function deleteBook(id) {
            if (confirm('Are you sure you want to delete this book?')) {
                AppData.deleteBook(id);
                loadBooks();
            }
        }
        
        loadBooks();
    </script>
</body>
</html>
