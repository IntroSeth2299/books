<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Add Book - Demo</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <h2>Add Book</h2>
        <a href="index.html" class="btn-back">Back</a>
        <form id="bookForm">
            <label>Title</label>
            <input type="text" id="title" placeholder="Title" required>
            <label>Pages</label>
            <input type="number" id="page" placeholder="Pages">
            <label>Publish Year</label>
            <input type="number" id="publish_year" placeholder="Publish Year">
            <label>Category</label>
            <input type="text" id="category" placeholder="Category">
            <button class="btn-add" type="submit">Save</button>
        </form>
    </div>

    <script src="../js/data.js"></script>
    <script>
        document.getElementById('bookForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const book = {
                title: document.getElementById('title').value,
                page: parseInt(document.getElementById('page').value) || 0,
                publish_year: parseInt(document.getElementById('publish_year').value) || 0,
                category: document.getElementById('category').value
            };
            
            AppData.addBook(book);
            alert('Book added successfully!');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
